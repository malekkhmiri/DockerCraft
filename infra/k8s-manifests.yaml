apiVersion: v1
kind: Namespace
metadata:
  name: dockergeneration
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dockergeneration-config
  namespace: dockergeneration
data:
  SPRING_PROFILES_ACTIVE: prod
  EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery:9012/eureka/
  OLLAMA_URL: http://ollama:11434
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: dockergeneration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: dockergeneration-gateway:latest
        ports:
        - containerPort: 9013
        envFrom:
        - configMapRef:
            name: dockergeneration-config
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: dockergeneration
spec:
  selector:
    app: gateway
  ports:
  - protocol: TCP
    port: 9013
    targetPort: 9013
  type: LoadBalancer
