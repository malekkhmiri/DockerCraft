stages:
  - build
  - test
  - docker-build

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end"

# Cache Maven dependencies between jobs
cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .m2/repository/

# ─────────────────────────────────────────────
# STAGE 1: BUILD - Compile all microservices
# ─────────────────────────────────────────────
build:
  stage: build
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - echo "🔨 Building all microservices..."
    - mvn $MAVEN_CLI_OPTS clean package -DskipTests
    - echo "✅ Build successful!"
  artifacts:
    paths:
      - "*/target/*.jar"
    expire_in: 1 hour
  only:
    - main
    - develop
    - merge_requests

# ─────────────────────────────────────────────
# STAGE 2: TEST - Run unit & integration tests
# ─────────────────────────────────────────────
test:
  stage: test
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - echo "🧪 Running tests..."
    - mvn $MAVEN_CLI_OPTS test
    - echo "✅ Tests passed!"
  artifacts:
    when: always
    reports:
      junit:
        - "*/target/surefire-reports/TEST-*.xml"
    expire_in: 1 week
  only:
    - main
    - develop
    - merge_requests

# ─────────────────────────────────────────────
# STAGE 3: DOCKER BUILD - Build Docker images
# ─────────────────────────────────────────────
docker-build:
  stage: docker-build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  script:
    - echo "🐳 Building Docker images..."
    - docker-compose build
    - echo "✅ Docker images built successfully!"
  only:
    - main
  when: manual
