server:
  port: 9013

spring:
  application:
    name: gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
              - "http://localhost:3000"
              - "http://127.0.0.1:4200"
              - "http://localhost"

            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: admin-route
          uri: lb://user-service
          predicates:
            - Path=/api/admin/**

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

        - id: project-service
          uri: lb://project-service
          predicates:
            - Path=/api/projects/**

        - id: dockerfile-service
          uri: lb://dockerfile-service
          predicates:
            - Path=/api/dockerfiles/**
