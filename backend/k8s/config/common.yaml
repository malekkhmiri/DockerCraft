apiVersion: v1
kind: Namespace
metadata:
  name: dockercraft
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: common-config
  namespace: dockercraft
data:
  SPRING_PROFILES_ACTIVE: prod
  EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://dc-discovery:8761/eureka/
  SPRING_CLOUD_CONFIG_URI: http://dc-config-server:8888
  SPRING_RABBITMQ_HOST: dc-rabbitmq
  DB_HOST: dc-db
  DB_NAME: DockerCraft
---
apiVersion: v1
kind: Secret
metadata:
  name: common-secrets
  namespace: dockercraft
type: Opaque
data:
  # Base64 encoded values for: user (db_user), password (db_pass), rabbit_user (guest), rabbit_pass (guest)
  # CHANGE THESE BEFORE PRODUCTION
  DB_USERNAME: ZGJfdXNlcg==
  DB_PASSWORD: ZGJfcGFzcw==
  RABBITMQ_USER: Z3Vlc3Q=
  RABBITMQ_PASSWORD: Z3Vlc3Q=
  GATEWAY_INTERNAL_SECRET: bXktc2VjcmV0LWtleQ==
