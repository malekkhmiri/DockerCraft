apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dockercraft-ingress
  namespace: dockercraft
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "dockercraft-ip"
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: dc-gateway
            port:
              number: 8080
---
# We also need a Service for Ollama to make it accessible internally
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dc-ollama
  namespace: dockercraft
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dc-ollama
  template:
    metadata:
      labels:
        app: dc-ollama
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
        volumeMounts:
        - name: ollama-data
          mountPath: /root/.ollama
      volumes:
      - name: ollama-data
        persistentVolumeClaim:
          claimName: ollama-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: dc-ollama
  namespace: dockercraft
spec:
  selector:
    app: dc-ollama
  ports:
  - port: 11434
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-pvc
  namespace: dockercraft
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
