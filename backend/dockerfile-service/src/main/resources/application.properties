spring.application.name=dockerfile-service

# Cloud Run injects PORT env var — Spring Boot MUST read it explicitly
server.port=${PORT:8080}

# H2 In-Memory Database (hardcoded, not via env var to avoid parsing issues)
spring.datasource.url=jdbc:h2:mem:dockercraft;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

# Ollama AI
ollama.model=qwen2.5-coder:3b
ollama.url=${OLLAMA_URL:http://dc-ollama:11434}

# Disable all unused cloud infrastructure
spring.cloud.config.enabled=false
eureka.client.enabled=false
spring.cloud.discovery.enabled=false
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration

# JPA optimisations
spring.jpa.open-in-view=false

# Logging
logging.level.root=WARN
logging.level.com.user=INFO
logging.level.org.springframework.web=INFO
