name: DockerCraft CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build All Backend Services
      run: mvn -f backend/pom.xml clean package -DskipTests

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # --- Build & Push Microservices ---

    - name: Discovery Service
      uses: docker/build-push-action@v5
      with:
        context: ./backend/discovery
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/dockercraft-discovery:latest

    - name: Config Server
      uses: docker/build-push-action@v5
      with:
        context: ./backend/config-server
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/dockercraft-config-server:latest

    - name: Gateway
      uses: docker/build-push-action@v5
      with:
        context: ./backend/gateway
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/dockercraft-gateway:latest

    - name: User Service
      uses: docker/build-push-action@v5
      with:
        context: ./backend/user-service
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/dockercraft-user-service:latest

    - name: Project Service
      uses: docker/build-push-action@v5
      with:
        context: ./backend/project-service
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/dockercraft-project-service:latest

    - name: Dockerfile Service
      uses: docker/build-push-action@v5
      with:
        context: ./backend/dockerfile-service
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/dockercraft-dockerfile-service:latest

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install and Build
      run: |
        npm install --prefix frontend
        npm run build --prefix frontend

  deploy-notify:
    needs: [build-and-push, build-frontend]
    runs-on: ubuntu-latest
    steps:
    - name: Deploy Notification
      run: echo "🚀 All services built and pushed to Docker Hub. Ready for cloud deployment."
